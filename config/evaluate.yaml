output_dir: scratch/proteingym_output


summary:
  class: ProteinGym
  path: {{ datadir }}
  csv_file: DMS_substitutions.csv

structure_path: {{ structdir }}
struc_align_path: {{ struc_align_dir }}
if_profile_path: {{ if_profile_dir }}


dataset:
  class: DMSAssay
  atom_feature: null
  bond_feature: null
  transform:
    class: Compose
    transforms:
      - class: MutantStructure
        key: graph
        template_key: wild_type
      - class: ProteinView
        view: residue

task:
  class:  ResidueTypePrediction
  mask_rate: 0.15
  dropout: 0.5
  plddt_threshold: 82
  model:
    class: FusionNetwork
    sequence_model:
      class: MyESM
      path:  esm-model-weights   # Your path to download esm model weights
      model: ESM-2-650M

    structure_model:
      class: GVPGNN
      node_in_dim: [1280, 0]
      node_h_dim: [256, 16]
      edge_in_dim: [16, 1]
      edge_h_dim: [64, 1]
      num_layers: 5
      vector_gate: True
      readout: mean
      drop_rate: 0.1
  
    profile_struc:
      class: LightProfileModule
      profile_out_dim: 1280
      profile_blocks: 4
      profile_dropout: 0.1
      num_amino_acids: 20
      profile_type: 'struc_profile'

    profile_if:
      class: LightProfileModule
      profile_h_dim: 256
      profile_out_dim: 1280
      profile_blocks: 4
      profile_dropout: 0.1
      num_amino_acids: 20
      profile_type: 'if_profile'
    
  graph_construction_model:
    class: GraphConstruction
    node_layers:
      - class: AlphaCarbonNode
    edge_layers:
      - class: SpatialEdge
        radius: 10.0
        min_distance: 0
    edge_feature: null


gpus: [0]   # Only support single gpu inference now
batch_size: 16

model_checkpoint: {{ ckpt }}

