output_dir: scratch/proteingym_output

dataset:
  class: CATH
  path: {{ datadir }}   # Your path to the dataset, specified in command line arguments
  struc_align_path: {{ struc_align_dir }} # Your path to the structure alignment, specified in command line arguments
  if_profile_path: {{ if_profile_dir }} # Your path to the inverse folding profile, specified in command line arguments
  max_length: 300
  profile_types: {{ profile_types }}
  preloaded_path: {{ preload_dir }} # Your path to the preprocessed dataset for faster loading, specified in command line arguments
  preload: True
  transform:
    class: ProteinView
    view: residue

split: [0.97, 0.02, 0.01]   # Split pre-training dataset into train, val, test

task:
  class: ResidueTypePrediction
  mask_rate: 0.15
  dropout: 0.5
  model:
    class: FusionNetwork
    sequence_model:
      class: MyESM
      path: /mnt/nas/datasets_tmp/bio/evoif/evoif_release/esm_weight # Your path to download esm model weights
      model: ESM-2-650M

    structure_model:
      class: GVPGNN
      node_in_dim: [1280, 0]
      node_h_dim: [256, 16]
      edge_in_dim: [16, 1]
      edge_h_dim: [64, 1]
      num_layers: 5
      vector_gate: True
      readout: mean
      drop_rate: 0.1

    profile_struc:
      class: LightProfileModule
      profile_out_dim: 1280
      profile_blocks: 4
      profile_dropout: 0.1
      num_amino_acids: 20
      profile_type: 'struc_profile'

    profile_if:
      class: LightProfileModule
      profile_h_dim: 256
      profile_out_dim: 1280
      profile_blocks: 4
      profile_dropout: 0.1
      num_amino_acids: 20
      profile_type: 'if_profile'

  graph_construction_model:
    class: GraphConstruction
    node_layers:
      - class: AlphaCarbonNode
    edge_layers:
      - class: SpatialEdge
        radius: 10.0
        min_distance: 0
    edge_feature: null


engine:
  gpus: [0]
  batch_size: 32
  num_workers: 64
  prefetch_factor: 16
  
fix_sequence_model: True    # Do not tune esm model weights

checkpoint: null # Put the path to your checkpoint here to continue pre-training

metric: accuracy

train:
  num_epoch: 80
